<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOWTRACK Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .up { color: #10b981; }
        .down { color: #f43f5e; }
        .status-bar { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: #334155; }
    </style>
</head>
<body>
    <header class="p-4 border-b border-slate-800 flex justify-between items-center">
        <h1 class="text-xl font-black italic text-green-400">FLOWTRACK</h1>
        <div id="conn-status" class="status-bar">初始化數據中...</div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div class="mb-6">
            <h2 class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">Macro / Indices</h2>
            <div id="list-container" class="card space-y-3">載入中...</div>
        </div>

        <div>
            <h2 class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">Watched Stocks</h2>
            <div id="stock-container" class="grid grid-cols-1 gap-3">載入中...</div>
        </div>
    </main>

    <script>
        const SYMBOLS = ['DX-Y.NYB', '^TNX', 'BTC-USD', '^GSPC', '^TWII', 'NVDA', 'TSM', '2330.TW'];

        function render(data) {
            const list = document.getElementById('list-container');
            const stocks = document.getElementById('stock-container');
            list.innerHTML = ''; stocks.innerHTML = '';

            data.forEach(item => {
                const price = item.regularMarketPrice?.toLocaleString() || '---';
                const change = item.regularMarketChangePercent?.toFixed(2) || '0.00';
                const isUp = item.regularMarketChange >= 0;
                const color = isUp ? 'up' : 'down';
                
                const html = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold">${item.symbol.replace('^','')}</span>
                        <div class="text-right font-mono">
                            <span class="${color} font-bold">${price}</span>
                            <span class="text-[10px] ml-1 ${color}">${isUp?'+':''}${change}%</span>
                        </div>
                    </div>`;

                if (item.symbol.includes('^') || item.symbol.includes('DX-Y') || item.symbol.includes('USD')) {
                    list.innerHTML += html;
                } else {
                    stocks.innerHTML += `<div class="card mb-0">${html}<div class="text-[9px] text-slate-500 mt-1">${item.shortName || ''}</div></div>`;
                }
            });
        }

        async function update() {
            const status = document.getElementById('conn-status');
            status.innerText = '同步中...';
            
            // 使用特定的跨域中轉介面
            const api = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${SYMBOLS.join(',')}`;
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent(api)}&_=${Date.now()}`;

            try {
                const res = await fetch(url);
                const json = await res.json();
                const result = JSON.parse(json.contents).quoteResponse.result;
                
                if (result && result.length > 0) {
                    render(result);
                    status.innerText = '● 已連線';
                    status.style.color = '#10b981';
                } else {
                    throw new Error();
                }
            } catch (e) {
                status.innerText = '重試連線中...';
                status.style.color = '#f43f5e';
                setTimeout(update, 5000); // 失敗後5秒自動重試
            }
        }

        update();
        setInterval(update, 60000); // 每分鐘更新
    </script>
</body>
</html>
