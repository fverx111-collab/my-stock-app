<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>FLOWTRACK Stock Market Application</title>
    <style>
        body { background-color: #1a202c; color: #cbd5e1; }
        .dark-theme { background-color: #2d3748; }
    </style>
</head>
<body class="dark-theme">
    <header class="bg-gray-800 p-4">
        <nav class="flex justify-between items-center">
            <h1 class="text-xl font-bold">Flowtrack</h1>
            <ul class="flex space-x-4">
                <li><a href="#" class="hover:text-gray-300">Home</a></li>
                <li><a href="#" class="hover:text-gray-300">Market</a></li>
                <li><a href="#" class="hover:text-gray-300">Watchlist</a></li>
                <li><a href="#" class="hover:text-gray-300">Settings</a></li>
            </ul>
        </nav>
    </header>
    <main class="p-4">
        <section class="mb-4">
            <h2 class="text-lg font-bold">Macro Liquidity</h2>
            <div id="macro-liquidity" class="p-2 border bg-gray-700">Loading...</div>
        </section>
        <section class="mb-4">
            <h2 class="text-lg font-bold">Market Indices</h2>
            <div id="market-indices" class="p-2 border bg-gray-700">Loading...</div>
        </section>
        <section class="mb-4">
            <h2 class="text-lg font-bold">Watched Stocks</h2>
            <div id="watched-stocks" class="p-2 border bg-gray-700">Loading...</div>
        </section>
    </main>
    <script>
        async function fetchData() {
            const response = await fetch('https://finance.yahoo.com/api/'); // Replace with actual Yahoo Finance API endpoint
            const data = await response.json();
            document.getElementById('macro-liquidity').innerHTML = JSON.stringify(data.macroLiquidity);
            document.getElementById('market-indices').innerHTML = JSON.stringify(data.marketIndices);
            document.getElementById('watched-stocks').innerHTML = JSON.stringify(data.watchedStocks);
        }
        async function fetchData() {
    try {
        const allSymbols = [...SYMBOLS.macro, ...SYMBOLS.indices, ...SYMBOLS.stocks].join(',');
        
        // 使用更強大的公共代理 corsproxy.io
        // 目標改用 query2 版本的接口，這在 2026 年通常更穩定
        const targetUrl = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${allSymbols}`;
        const finalUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

        const res = await fetch(finalUrl);
        
        if (!res.ok) throw new Error('網路請求失敗');
        
        const json = await res.json();
        const data = json.quoteResponse.result;

        if (data && data.length > 0) {
            renderUI(data);
            document.getElementById('timestamp').innerHTML = `最後更新：${new Date().toLocaleString()}`;
        } else {
            throw new Error('找不到數據內容');
        }
    } catch (error) {
        console.error('抓取失敗:', error);
        document.getElementById('timestamp').innerHTML = '數據獲取中，請稍候... (若持續顯示請重整)';
        
        // 備用方案：如果第一代理失敗，3秒後嘗試第二代理
        setTimeout(fetchDataWithBackup, 3000);
    }
}

// 備用抓取邏輯 (增加穩定性)
async function fetchDataWithBackup() {
    const allSymbols = [...SYMBOLS.macro, ...SYMBOLS.indices, ...SYMBOLS.stocks].join(',');
    const targetUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${allSymbols}`;
    const backupUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

    try {
        const res = await fetch(backupUrl);
        const json = await res.json();
        const actualData = JSON.parse(json.contents);
        renderUI(actualData.quoteResponse.result);
        document.getElementById('timestamp').innerHTML = `最後更新：${new Date().toLocaleString()} (備用路徑)`;
    } catch (e) {
        document.getElementById('timestamp').innerHTML = '目前連線不穩定，請檢查網路或稍後再試';
    }
}

        setInterval(fetchData, 60000); // Refresh every 60 seconds
    </script>
</body>
</html>
