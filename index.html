<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOWTRACK PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black italic text-green-400">FLOWTRACK</h1>
            <div id="status" class="text-[10px] px-2 py-1 rounded bg-slate-800 text-slate-500">初始化偵錯模式...</div>
        </div>

        <div id="display" class="space-y-3">
            <div class="text-center p-10 text-slate-500">正在嘗試穿透防火牆...</div>
        </div>

        <div id="debug-log" class="mt-8 p-3 bg-black/50 rounded text-[10px] font-mono text-red-400 border border-red-900/30 hidden">
            <div class="text-white mb-1 uppercase">偵錯訊息 (請截圖給我):</div>
            <div id="log-content"></div>
        </div>
    </div>

    <script>
        function log(msg) {
            const el = document.getElementById('debug-log');
            const content = document.getElementById('log-content');
            el.style.display = 'block';
            content.innerText += `> ${msg}\n`;
        }

        async function update() {
            const status = document.getElementById('status');
            const display = document.getElementById('display');
            const symbols = ['DX-Y.NYB', '^TNX', 'BTC-USD', 'NVDA', '2330.TW'];
            
            // 使用「跨域穿透力最強」的 Google 轉發引擎
            const target = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(',')}`;
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}&_=${Date.now()}`;

            try {
                log("發送請求中...");
                const response = await fetch(url);
                log(`伺服器回應狀態: ${response.status}`);
                
                const json = await response.json();
                const data = JSON.parse(json.contents).quoteResponse.result;

                if (data && data.length > 0) {
                    display.innerHTML = '';
                    data.forEach(item => {
                        const isUp = item.regularMarketChange >= 0;
                        const color = isUp ? 'text-green-400' : 'text-red-400';
                        display.innerHTML += `
                            <div class="card flex justify-between items-center">
                                <span class="font-bold">${item.symbol}</span>
                                <div class="text-right">
                                    <div class="${color} font-mono font-bold">${item.regularMarketPrice.toLocaleString()}</div>
                                    <div class="${color} text-[10px]">${isUp?'+':''}${item.regularMarketChangePercent.toFixed(2)}%</div>
                                </div>
                            </div>`;
                    });
                    status.innerText = "● 連線正常";
                    status.classList.replace('text-slate-500', 'text-green-400');
                    log("數據渲染完成");
                }
            } catch (e) {
                log(`錯誤詳情: ${e.message}`);
                status.innerText = "⚠️ 數據源被阻斷";
                status.classList.replace('text-slate-500', 'text-red-500');
            }
        }

        update();
        setInterval(update, 60000);
    </script>
</body>
</html>
