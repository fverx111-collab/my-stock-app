<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOWTRACK 極速版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold text-green-400 mb-4">FLOWTRACK</h1>
        <div id="status" class="text-xs text-slate-500 mb-4">嘗試建立安全連線...</div>
        <div id="display" class="space-y-3">
            <div class="animate-pulse bg-slate-800 h-20 rounded-xl"></div>
        </div>
    </div>

    <script>
        async function load() {
            const status = document.getElementById('status');
            const display = document.getElementById('display');
            const symbols = ['DX-Y.NYB','^TNX','BTC-USD','NVDA','2330.TW'];
            
            // 使用 Google Apps Script 代理，這是目前最強的穿透方案
            const proxy = "https://script.google.com/macros/s/AKfycbwde_m79p0p_F5p-t5XwL5X5X5X5X5X5X/exec"; // 此為概念路徑
            // 備用方案：直接嘗試從另一個公共中轉站抓取
            const target = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(',')}`;
            const url = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(target)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const quotes = data.quoteResponse.result;
                
                display.innerHTML = '';
                quotes.forEach(q => {
                    const color = q.regularMarketChange >= 0 ? 'text-green-400' : 'text-red-400';
                    display.innerHTML += `
                        <div class="bg-slate-800 p-4 rounded-xl flex justify-between">
                            <span class="font-bold">${q.symbol}</span>
                            <div class="text-right">
                                <div class="${color} font-mono">${q.regularMarketPrice.toFixed(2)}</div>
                                <div class="${color} text-xs">${q.regularMarketChangePercent.toFixed(2)}%</div>
                            </div>
                        </div>`;
                });
                status.innerText = "● 數據已同步";
            } catch (e) {
                status.innerText = "❌ 網路環境受限，請嘗試切換行動網路";
            }
        }
        load();
        setInterval(load, 60000);
    </script>
</body>
</html>
