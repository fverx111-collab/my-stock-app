<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOWTRACK 核心監控</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .up { color: #10b981; font-weight: bold; }
        .down { color: #f43f5e; font-weight: bold; }
        .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: #334155; }
    </style>
</head>
<body>
    <header class="p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-900 z-50">
        <h1 class="text-xl font-black italic text-green-400">FLOWTRACK</h1>
        <div id="status" class="status-pill text-slate-400">連線初始化...</div>
    </header>

    <main class="p-4 max-w-lg mx-auto pb-20">
        <section class="mb-6">
            <h2 class="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-[0.2em]">Global Indices & Macro</h2>
            <div id="indices-list" class="card space-y-4">數據載入中...</div>
        </section>

        <section>
            <h2 class="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-[0.2em]">Focus Stocks</h2>
            <div id="stocks-list" class="grid grid-cols-1 gap-3">數據載入中...</div>
        </section>
        
        <div id="last-update" class="text-center text-[10px] text-slate-600 mt-6"></div>
    </main>

    <script>
        // 你的核心追蹤清單
        const SYMBOLS = ['DX-Y.NYB', '^TNX', 'BTC-USD', '^GSPC', '^TWII', 'NVDA', 'TSM', '2330.TW'];

        function renderData(result) {
            const indicesEl = document.getElementById('indices-list');
            const stocksEl = document.getElementById('stocks-list');
            indicesEl.innerHTML = ''; stocksEl.innerHTML = '';

            result.forEach(item => {
                const price = item.regularMarketPrice ? item.regularMarketPrice.toLocaleString(undefined, {minimumFractionDigits: 2}) : '---';
                const pct = item.regularMarketChangePercent ? item.regularMarketChangePercent.toFixed(2) : '0.00';
                const isUp = item.regularMarketChange >= 0;
                const color = isUp ? 'up' : 'down';
                const sign = isUp ? '+' : '';

                const rowHtml = `
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-slate-200">${item.symbol.replace('^','')}</span>
                        <div class="text-right">
                            <span class="${color} font-mono">${price}</span>
                            <span class="text-[10px] ml-2 ${color} opacity-80">${sign}${pct}%</span>
                        </div>
                    </div>`;

                if (item.symbol.includes('^') || item.symbol.includes('DX-Y') || item.symbol.includes('USD')) {
                    indicesEl.innerHTML += rowHtml;
                } else {
                    stocksEl.innerHTML += `
                        <div class="card mb-0 bg-slate-800/40">
                            <div class="flex justify-between items-center">
                                <span class="font-black text-white">${item.symbol}</span>
                                <span class="${color} text-sm">${sign}${pct}%</span>
                            </div>
                            <div class="text-2xl font-mono mt-1">${price}</div>
                        </div>`;
                }
            });
            document.getElementById('last-update').innerText = '最後更新：' + new Date().toLocaleTimeString();
        }

        // 強大的三重備援抓取機制
        async function smartFetch() {
            const statusEl = document.getElementById('status');
            const symbolsStr = SYMBOLS.join(',');
            const target = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbolsStr}`;
            
            // 嘗試路徑 1: AllOrigins (最推薦)
            try {
                statusEl.innerText = '正在嘗試通道 A...';
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}&_=${Date.now()}`);
                const json = await res.json();
                const data = JSON.parse(json.contents).quoteResponse.result;
                if (data && data.length > 0) { renderData(data); statusEl.innerText = '● 已連線'; return; }
            } catch (e) {}

            // 嘗試路徑 2: Corsproxy.io
            try {
                statusEl.innerText = '通道 A 忙碌，切換 B...';
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(target)}`);
                const json = await res.json();
                if (json.quoteResponse.result) { renderData(json.quoteResponse.result); statusEl.innerText = '● 已連線 (B)'; return; }
            } catch (e) {}

            // 嘗試路徑 3: ThingProxy
            try {
                statusEl.innerText = '通道 B 忙碌，切換 C...';
                const res = await fetch(`https://thingproxy.freeboard.io/fetch/${target}`);
                const json = await res.json();
                if (json.quoteResponse.result) { renderData(json.quoteResponse.result); statusEl.innerText = '● 已連線 (C)'; return; }
            } catch (e) {}

            statusEl.innerText = '⚠️ 訊號微弱，重連中...';
            setTimeout(smartFetch, 5000);
        }

        smartFetch();
        setInterval(smartFetch, 60000);
    </script>
</body>
</html>
