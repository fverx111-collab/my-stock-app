<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOWTRACK 終極版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .up { color: #10b981; } .down { color: #f43f5e; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black italic text-green-400">FLOWTRACK</h1>
            <div id="status" class="text-[10px] px-2 py-1 rounded bg-slate-800 text-slate-500">穩定性測試中...</div>
        </header>

        <div id="indices" class="card space-y-4 text-slate-500 text-center italic">建立 Google 專用通道中...</div>
        <div id="stocks" class="space-y-3"></div>
        
        <div id="debug" class="mt-6 p-3 bg-red-900/20 text-red-400 text-[10px] font-mono rounded hidden"></div>
    </div>

    <script>
        const SYMBOLS = ['DX-Y.NYB', '^TNX', 'BTC-USD', '^GSPC', '^TWII', 'NVDA', 'TSM', '2330.TW'];

        async function update() {
            const status = document.getElementById('status');
            const debug = document.getElementById('debug');
            
            // 改用更強大的代理中轉，避開之前失效的 AllOrigins
            const target = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${SYMBOLS.join(',')}`;
            const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(target)}`;

            try {
                const res = await fetch(proxy);
                if (!res.ok) throw new Error(`HTTP 錯誤: ${res.status}`);
                const data = await res.json();
                const results = data.quoteResponse.result;

                if (results) {
                    render(results);
                    status.innerText = "● Google 通道已連線";
                    status.className = "text-[10px] px-2 py-1 rounded bg-green-900/30 text-green-400";
                }
            } catch (e) {
                console.error(e);
                debug.style.display = 'block';
                debug.innerText = "連線失敗：" + e.message + " (請確認 4G 收訊)";
            }
        }

        function render(data) {
            const indicesEl = document.getElementById('indices');
            const stocksEl = document.getElementById('stocks');
            indicesEl.innerHTML = ''; stocksEl.innerHTML = '';

            data.forEach(item => {
                const price = item.regularMarketPrice?.toLocaleString() || '---';
                const change = item.regularMarketChangePercent?.toFixed(2) || '0.00';
                const color = item.regularMarketChange >= 0 ? 'up' : 'down';
                const html = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold">${item.symbol.replace('^','')}</span>
                        <div class="text-right font-mono">
                            <span class="${color} font-bold">${price}</span>
                            <span class="text-[10px] ml-1 ${color}">${change}%</span>
                        </div>
                    </div>`;

                if (item.symbol.match(/\^|DX-Y|USD/)) indicesEl.innerHTML += html;
                else stocksEl.innerHTML += `<div class="card bg-slate-800/40">${html}</div>`;
            });
        }

        update();
        setInterval(update, 60000);
    </script>
</body>
</html>
