<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOWTRACK 核心監控</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .status-pill { font-size: 10px; padding: 4px 10px; border-radius: 99px; background: #1e293b; border: 1px solid #334155; }
        .error-log { font-size: 10px; color: #f43f5e; margin-top: 10px; background: #1a1a1a; padding: 5px; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-50">
        <h1 class="text-xl font-black italic text-green-400 italic">FLOWTRACK</h1>
        <div id="status" class="status-pill text-slate-400">正在喚醒數據流...</div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div id="main-content">
            <div id="indices-list" class="card space-y-4 text-center text-slate-500 italic">初始化中...</div>
            <div id="stocks-list" class="grid grid-cols-1 gap-3 text-center text-slate-500 italic">等待數據同步...</div>
        </div>
        
        <div id="error-display" class="error-log"></div>
    </main>

    <script>
        const SYMBOLS = ['DX-Y.NYB', '^TNX', 'BTC-USD', '^GSPC', '^TWII', 'NVDA', 'TSM', '2330.TW'];

        function logError(msg) {
            const el = document.getElementById('error-display');
            el.style.display = 'block';
            el.innerText = `[診斷訊息]: ${msg}`;
        }

        function render(data) {
            const indicesEl = document.getElementById('indices-list');
            const stocksEl = document.getElementById('stocks-list');
            indicesEl.innerHTML = ''; stocksEl.innerHTML = '';

            data.forEach(item => {
                const price = item.regularMarketPrice?.toLocaleString() || '---';
                const change = item.regularMarketChangePercent?.toFixed(2) || '0.00';
                const isUp = item.regularMarketChange >= 0;
                const color = isUp ? 'text-green-400' : 'text-red-400';
                
                const html = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold">${item.symbol.replace('^','')}</span>
                        <div class="text-right font-mono">
                            <span class="${color} font-bold">${price}</span>
                            <span class="text-[10px] ml-1 ${color}">${isUp?'+':''}${change}%</span>
                        </div>
                    </div>`;

                if (item.symbol.match(/\^|DX-Y|USD/)) indicesEl.innerHTML += html;
                else stocksEl.innerHTML += `<div class="card mb-0 bg-slate-800/40">${html}</div>`;
            });
        }

        async function startSync() {
            const status = document.getElementById('status');
            const errEl = document.getElementById('error-display');
            status.innerText = '● 同步中';
            errEl.style.display = 'none';

            // 使用「原始輸出模式」的代理站，避開解析錯誤
            const target = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${SYMBOLS.join(',')}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}&_=${Date.now()}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('代理伺服器無回應');
                
                const json = await response.json();
                const rawData = JSON.parse(json.contents);
                const results = rawData.quoteResponse.result;

                if (results && results.length > 0) {
                    render(results);
                    status.innerText = '● 已連線';
                    status.classList.remove('text-slate-400');
                    status.classList.add('text-green-400');
                } else {
                    throw new Error('API 回傳數據格式錯誤');
                }
            } catch (e) {
                console.error(e);
                logError(e.message);
                status.innerText = '⚠️ 連線異常';
                status.classList.add('text-red-500');
                // 10秒後自動重試
                setTimeout(startSync, 10000);
            }
        }

        startSync();
        // 每分鐘自動更新
        setInterval(startSync, 60000);
    </script>
</body>
</html>
