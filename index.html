<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOWTRACK 核心監控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: -apple-system, system-ui, sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 16px; }
        .up { color: #4ade80; }
        .down { color: #f87171; }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black italic text-green-400">FLOWTRACK</h1>
        <div id="status" class="text-[10px] px-3 py-1 rounded-full bg-slate-800 text-slate-400">連線初始化...</div>
    </header>

    <div class="max-w-md mx-auto space-y-6">
        <div id="indices" class="card space-y-4">
            <div class="animate-pulse text-slate-600 text-center">正在搜尋全球訊號...</div>
        </div>

        <div id="stocks" class="grid grid-cols-1 gap-3"></div>
        
        <div id="debug-info" class="text-[10px] text-slate-700 bg-black/30 p-2 rounded hidden"></div>
        <div id="last-update" class="text-center text-[10px] text-slate-500 pt-4"></div>
    </div>

    <script>
        // 目標清單
        const SYMBOLS = ['^GSPC', '^TWII', 'DX-Y.NYB', 'BTC-USD', 'NVDA', 'TSM', '2330.TW'];

        function updateUI(data) {
            const indicesEl = document.getElementById('indices');
            const stocksEl = document.getElementById('stocks');
            indicesEl.innerHTML = ''; stocksEl.innerHTML = '';

            data.forEach(item => {
                const price = item.regularMarketPrice ? item.regularMarketPrice.toLocaleString(undefined, {minimumFractionDigits: 2}) : '---';
                const pct = item.regularMarketChangePercent ? item.regularMarketChangePercent.toFixed(2) : '0.00';
                const isUp = item.regularMarketChange >= 0;
                const color = isUp ? 'up' : 'down';
                const sign = isUp ? '+' : '';

                const row = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-slate-300">${item.symbol.replace('^','')}</span>
                        <div class="text-right">
                            <span class="${color} font-mono font-bold">${price}</span>
                            <span class="text-[10px] ml-2 opacity-80 ${color}">${sign}${pct}%</span>
                        </div>
                    </div>`;

                if (item.symbol.includes('^') || item.symbol.includes('DX-Y') || item.symbol.includes('USD')) {
                    indicesEl.innerHTML += row;
                } else {
                    stocksEl.innerHTML += `<div class="card bg-slate-800/50">${row}</div>`;
                }
            });
            document.getElementById('last-update').innerText = '最後同步：' + new Date().toLocaleTimeString();
        }

        async function fetchData() {
            const status = document.getElementById('status');
            const debug = document.getElementById('debug-info');
            const symbolsStr = SYMBOLS.join(',');
            const yfUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbolsStr}`;
            
            // 這次改用「CORS-Anywhere」的公開備援
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(yfUrl)}&_=${Date.now()}`,
                `https://corsproxy.io/?${encodeURIComponent(yfUrl)}`
            ];

            for (const url of proxies) {
                try {
                    status.innerText = '● 嘗試數據同步...';
                    const res = await fetch(url);
                    const json = await res.json();
                    
                    // AllOrigins 需要解析 json.contents
                    let result;
                    if (json.contents) {
                        result = JSON.parse(json.contents).quoteResponse.result;
                    } else if (json.quoteResponse) {
                        result = json.quoteResponse.result;
                    }

                    if (result && result.length > 0) {
                        updateUI(result);
                        status.innerText = '● 連線正常';
                        status.className = 'text-[10px] px-3 py-1 rounded-full bg-green-900/30 text-green-400';
                        return; // 成功就跳出
                    }
                } catch (e) {
                    debug.style.display = 'block';
                    debug.innerText = 'ERR: ' + e.message;
                }
            }
            
            status.innerText = '⚠️ 訊號阻塞，重試中...';
            setTimeout(fetchData, 10000);
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
